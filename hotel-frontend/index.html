<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotellbokning</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 id="welcome">Välkommen till hotellbokning</h1>

    <form id="bookingForm">
      <label for="guest_id">Guest-ID</label>
      <input type="number" id="guest_id" required>

      <label for="room_id">Välj rum</label>
      <select id="room_id" required>
        <option value="">Laddar rum...</option>
      </select>

      <label for="datefrom">Från datum</label>
      <input type="date" id="datefrom" required>

      <label for="dateto">Till datum</label>
      <input type="date" id="dateto" required>

      <label for="addinfo">Gästens önskemål / extra info</label>
      <input type="text" id="addinfo" placeholder="Till exempel: kommer sent på natten">

      <input type="button" id="createBookingBtn" value="Skapa bokning">

      <div id="message"></div>
    </form>

    <h2>Alla bokningar</h2>
    <ul id="bookingList"></ul>

    <h2>Alla rum</h2>
    <ul id="roomList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
